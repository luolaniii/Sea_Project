spring:
  datasource:
    # 本地 MySQL
    url: jdbc:mysql://127.0.0.1:3306/sea_db?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&autoReconnect=true&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    # 本地 Redis（tporadowski Windows 便携版，端口 6379，无密码，db 0）
    host: 127.0.0.1
    port: 6379
    password:
    timeout: 60s
    database: 0
    lettuce:
      pool:
        # 连接池最大连接数（使用负值表示没有限制） 默认 8
        max-active: 40
        # 连接池中的最大空闲连接 默认 0
        max-idle: 30
        # 连接池中的最小空闲连接 默认 0
        min-idle: 10
        # 连接池最大阻塞等待时间（使用负值表示没有限制） 默认 -1
        max-wait: 5s
        #空闲连接回收间隔，为负时不创建空闲回收线程，为正时表示定时空闲连接回收间隔
        time-between-eviction-runs: 1s

swagger:
  enabled: true